<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Your Car</title>
    <link rel="stylesheet" href="./findyourcar.css"/>
     <script
      src="https://kit.fontawesome.com/eb6cde8b72.js"
      crossorigin="anonymous"
    ></script>
     <script src="./findyourcar.js" defer></script>
  </head>
  <body>
    <section id="landing">
      <div class="container">
        <nav>
            <div class="nav__row">
          <img
            src="./assets/blinker-icon.4f9b2663.png"
            alt=""
            class="nav__logo"
          />
          <ul class="nav__links">
            <li class="nav__link"><a class="nav__link--anchor" href="#">Home</a></li>
            <li class="nav__link"><a class="nav__link--anchor" href="#">Find Your Car</a></li>
            <li class="nav__link"><a class="nav__link--anchor nav__link--primary click" href="#">Contact Us</a></li>
          </ul>
          </div>
        </nav>
        <header>
        <div class="row search__row">
          <h1 class="search__title">Browse Our Cars</h1>
          <div class="search__input-wrapper">
            <label for="search">Search Cars</label>
            <input
              type="text"
              placeholder="Search by Make, Model or Keyword"
              class="search__input"
            />
            <button class="search__button">
                <i class="fa-solid fa-magnifying-glass search__icon"></i>
            </button>
          </div>
        </div>
        </header>
        <div class="overlay"></div>
      </div>
    </section>
  </body>
</html>
